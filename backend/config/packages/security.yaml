security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        # Authentification JSON (login)
        login:
            pattern: ^/api/auth/login$
            stateless: true
            json_login:
                check_path: /api/auth/login
                username_path: email
                password_path: password
                success_handler: App\Security\LoginSuccessHandler
                failure_handler: App\Security\LoginFailureHandler

        # Endpoints publics d'authentification (refresh, logout)
        auth_public:
            pattern: ^/api/auth/(refresh|logout)$
            stateless: true
            security: false

        # API protegee par JWT
        api:
            pattern: ^/(api|mcp)
            stateless: true
            custom_authenticators:
                - App\Security\OAuthTokenAuthenticator
            jwt: ~

        # Firewall pour l'interface OAuth (formulaire de login)
        main:
            lazy: true
            form_login:
                login_path: app_login
                check_path: app_login
                username_parameter: _username
                password_parameter: _password
                enable_csrf: true
            logout:
                path: /logout

    access_control:
        - { path: ^/api/auth/login$, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/refresh$, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/logout$, roles: PUBLIC_ACCESS }
        - { path: ^/api/register$, roles: PUBLIC_ACCESS }
        - { path: ^/api/docs, roles: PUBLIC_ACCESS }
        - { path: ^/\.well-known/, roles: PUBLIC_ACCESS }
        - { path: ^/oauth/, roles: PUBLIC_ACCESS }
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/api, roles: ROLE_USER }
        - { path: ^/mcp, roles: ROLE_USER }
        - { path: ^/webhooks, roles: PUBLIC_ACCESS }
        - { path: ^/health, roles: PUBLIC_ACCESS }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
