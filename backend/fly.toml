# fly.toml app configuration file generated for factura-api on 2026-04-06T08:59:06+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'factura-api'
primary_region = 'cdg'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[checks]
  [checks.health]
    port = 8080
    type = 'http'
    interval = '15s'
    timeout = '5s'
    path = '/health'

[[vm]]
  memory = '256mb'
  cpus = 1
