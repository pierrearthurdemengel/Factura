services:
    php:
        build:
            context: ./backend
            dockerfile: Dockerfile
        volumes:
            - ./backend:/var/www/html
        depends_on:
            - postgres
            - redis
        environment:
            DATABASE_URL: postgresql://factura:factura@postgres:5432/factura?serverVersion=16&charset=utf8
            MESSENGER_TRANSPORT_DSN: redis://redis:6379/messages
            APP_ENV: dev
            APP_SECRET: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4
        networks:
            - factura

    nginx:
        image: nginx:alpine
        ports:
            - "8080:80"
        volumes:
            - ./backend:/var/www/html
            - ./backend/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - php
        networks:
            - factura

    postgres:
        image: postgres:16-alpine
        environment:
            POSTGRES_USER: factura
            POSTGRES_PASSWORD: factura
            POSTGRES_DB: factura
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - factura

    redis:
        image: redis:7-alpine
        ports:
            - "6379:6379"
        networks:
            - factura

volumes:
    postgres_data:

networks:
    factura:
        driver: bridge
